# Minimal cargo-deny configuration for stellar-contracts
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Suppress advisories for unmaintained crates we cannot control (coming from soroban-sdk)
deny = []
skip = [
    # paste is unmaintained but required by soroban-wasmi (transitive dependency from soroban-sdk)
    # This is a known limitation when using Soroban SDK
    "RUSTSEC-2024-0436",
]

[licenses]
# Allow commonly-used permissive licenses
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0"]
# Allow specific compound licenses
allow-osi-fsf-free = true
copyleft = "warn"

[bans]
# Warn when multiple versions of the same crate are present
multiple-versions = "warn"

[sources]
# Restrict registries to crates.io index
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# No custom git allow-list by default
allow-git = []
